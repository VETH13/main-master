<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ritual Demo — Playable</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#111; color:#eee; }
    #topbar { height:48px; background:#1b1b1b; display:flex; align-items:center; padding:0 12px; box-shadow:0 2px 6px rgba(0,0,0,0.5); }
    #title { font-weight:600; }
    #address { margin-left:auto; font-size:0.9rem; color:#9ecbf3; }
    #connectBtn { margin-left:12px; background:#2ea3ff; color:#022; border:none; padding:6px 10px; cursor:pointer; border-radius:6px; }
    #gameWrap { display:flex; justify-content:center; padding:12px; }
    canvas { background: linear-gradient(#73b1ff,#7bd6ff); border:4px solid #222; border-radius:8px; display:block; }
    #overlay { position:fixed; left:0; right:0; top:48px; bottom:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .card { pointer-events:auto; background:rgba(0,0,0,0.85); color:#fff; padding:20px; border-radius:10px; min-width:280px; text-align:center; box-shadow:0 6px 20px rgba(0,0,0,0.6); }
    .btn { background:#2ea3ff; color:#022; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; margin-top:12px; }
    .small { font-size:0.9rem; color:#cfd8e3; margin-top:8px; }
    #hint { position: absolute; left:20px; top:64px; color:#0b2; font-weight:600; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
</head>
<body>
  <div id="topbar">
    <div id="title">Ritual Demo — 即时试玩</div>
    <div id="address">未连接</div>
    <button id="connectBtn">Connect Wallet</button>
  </div>

  <div id="gameWrap">
    <canvas id="game" width="900" height="480"></canvas>
  </div>

  <div id="overlay"></div>
  <div id="hint">按 ← → 跳跃：W / ↑ / Space</div>

  <script>
    // --- Wallet connect (read-only balance display) ---
    const connectBtn = document.getElementById('connectBtn');
    const addressEl = document.getElementById('address');
    let provider = null, signer = null, userAddress = null;

    async function connectWallet() {
      if (!window.ethereum) {
        alert('请安装 MetaMask 或其他 Web3 钱包后重试。');
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        const bal = await provider.getBalance(userAddress);
        const balStr = ethers.utils.formatEther(bal);
        addressEl.textContent = `${userAddress} — ${balStr} RIT?`;
        connectBtn.textContent = 'Connected';
        connectBtn.disabled = true;
      } catch (e) {
        console.error(e);
        alert('连接失败：' + (e.message || e));
      }
    }
    connectBtn.addEventListener('click', connectWallet);

    // --- Simple Canvas Platformer ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function keyDown(name) {
      return keys[name] || false;
    }

    // World
    const gravity = 1800;
    const player = { x:80, y:320, w:32, h:48, vx:0, vy:0, speed:260, jump: -620, onGround:false };
    const platforms = [
      {x:0, y:400, w:900, h:80},
      {x:220, y:320, w:120, h:16},
      {x:420, y:260, w:120, h:16},
      {x:640, y:200, w:120, h:16}
    ];
    const goal = { x:780, y:140, w:64, h:60 };

    let lastTime = 0;
    let gameWon = false;

    function rectsIntersect(a,b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function physicsStep(dt) {
      // input
      let dir = 0;
      if (keyDown('ArrowLeft') || keyDown('KeyA')) dir -= 1;
      if (keyDown('ArrowRight') || keyDown('KeyD')) dir += 1;
      player.vx = dir * player.speed;

      // gravity
      player.vy += gravity * dt;

      // jump
      if ((keyDown('ArrowUp') || keyDown('KeyW') || keyDown('Space')) && player.onGround) {
        player.vy = player.jump;
        player.onGround = false;
      }

      // integrate
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      // simple collision with platforms (AABB resolution)
      player.onGround = false;
      for (let p of platforms) {
        if (rectsIntersect(player, p)) {
          if (player.vy > 0 && player.y + player.h - player.vy*dt <= p.y) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0 && player.y >= p.y + p.h - 1) {
            player.y = p.y + p.h;
            player.vy = 0;
          } else {
            if (player.vx > 0) player.x = p.x - player.w - 0.1;
            else if (player.vx < 0) player.x = p.x + p.w + 0.1;
            player.vx = 0;
          }
        }
      }

      // bounds
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
      if (player.y > canvas.height + 200) {
        resetPlayer();
      }

      // win check
      if (!gameWon && rectsIntersect(player, goal)) {
        gameWon = true;
        showWinOverlay();
      }
    }

    function resetPlayer() {
      player.x = 80; player.y = 320; player.vx = 0; player.vy = 0; player.onGround = false;
      gameWon = false;
      clearOverlay();
    }

    function render() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#6d4';
      for (let p of platforms) {
        ctx.fillStyle = '#5b3'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#2a1'; ctx.strokeRect(p.x, p.y, p.w, p.h);
      }

      ctx.fillStyle = '#ff7f50';
      ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
      ctx.strokeStyle = '#d05a2f'; ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);
      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('GOAL', goal.x+6, goal.y + goal.h/2 +6);

      ctx.fillStyle = '#222';
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.strokeStyle = '#000';
      ctx.strokeRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = '#022';
      ctx.fillRect(8,8,220,44);
      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('位置: ' + Math.floor(player.x) + ',' + Math.floor(player.y), 16, 28);
      ctx.fillText('跳跃: W/↑/Space', 16, 46);
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min((ts - lastTime) / 1000, 0.033);
      lastTime = ts;
      physicsStep(dt);
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);

    // --- Overlay / Win UI ---
    const overlay = document.getElementById('overlay');

    function showWinOverlay() {
      overlay.innerHTML = '';
      const node = document.createElement('div');
      node.className = 'card';
      node.innerHTML = '<h2>关卡完成！🎉</h2><div class="small">你到达了终点。</div>';
      const btnRecord = document.createElement('button');
      btnRecord.className = 'btn';
      btnRecord.textContent = '可选：记录成绩到链上（需要签名）';
      btnRecord.onclick = async () => {
        if (!provider) {
          if (confirm('尚未连接钱包，是否现在连接？')) {
            await connectWallet();
          } else return;
        }
        try {
          const message = 'Ritual Demo: Level complete by ' + (userAddress || 'unknown') + ' at ' + new Date().toISOString();
          const signature = await signer.signMessage(message);
          alert('已签名（示例，不上链）:\n' + signature.slice(0,40) + '...');
        } catch (e) {
          alert('签名失败：' + (e.message || e));
        }
      };
      const btnContinue = document.createElement('button');
      btnContinue.className = 'btn';
      btnContinue.style.marginLeft = '8px';
      btnContinue.textContent = '重玩';
      btnContinue.onclick = () => { resetPlayer(); };
      node.appendChild(btnRecord);
      node.appendChild(btnContinue);
      overlay.appendChild(node);
    }

    function clearOverlay() { overlay.innerHTML = ''; }

    canvas.addEventListener('click', () => canvas.focus());

  </script>
</body>
</html>
